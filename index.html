<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Information - University of Science and Technology</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fff;
            color: #333;
        }
        /* شريط التنقل العلوي */
        .navbar {
            display: flex;
            align-items: center;
            padding: 10px 50px;
            border-bottom: 1px solid #e0e0e0;
            background-color: #fff;
        }
        .navbar img {
            height: 40px;
            margin-right: 15px;
        }
        .nav-links {
            display: flex;
            gap: 20px;
            color: #666;
            font-size: 14px;
        }
        .sign-in {
            margin-left: auto;
            color: #333;
            font-weight: bold;
            font-size: 14px;
        }
        /* محتوى الصفحة */
        .container {
            padding: 40px 50px;
        }
        h1 {
            font-size: 32px;
            font-weight: normal;
            margin-bottom: 30px;
        }
        .student-photo {
            width: 220px;
            height: auto;
            border: 1px solid #ddd;
            margin-bottom: 25px;
            display: block;
        }
        .info-group {
            line-height: 1.8;
            font-size: 18px;
        }
        .label {
            font-weight: bold;
        }
        .email {
            font-size: 14px;
            color: #555;
        }
        /* حالة الدخول المعدلة للأخضر */
        .status {
            font-size: 22px;
            font-weight: bold;
            color: #28a745; /* لون أخضر */
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <img src="ust_logo.png" alt="UST Logo">
        <div class="nav-links">
            <span>Home</span>
            <span>Student Services ▾</span>
        </div>
        <div class="sign-in">Sign in</div>
    </div>

    <div class="container">
        <h1>Student Information:</h1>
        
        <img src="hazim.jpg" alt="Hazim Ibrahim" class="student-photo">

        <div class="info-group">
            <div><span class="label">Name:</span> حازم ابراهيم حامد احمد</div>
            <div><span class="label">program:</span> Architecture and spatial planning</div>
            <div><span class="label">Batch:</span> AB/0019/2019/ENAR</div>
            <div><span class="label">Level:</span> Five</div>
            <br>
            <div><span class="label">Student E-mail:</span> <span class="email">hazim.2019enarb0037@ust.edu.sd</span></div>
            <br>
            <div><span class="label">Location:</span> Saudi Arabia - Riyadh</div>
            <div class="status">Allowed to enter.</div>
        </div>
    </div>

</body>
</html>
